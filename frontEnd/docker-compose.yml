services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:3000}
        VITE_CATALOG_API_URL: ${VITE_CATALOG_API_URL:-http://localhost:3001}
        VITE_ORDERS_API_URL: ${VITE_ORDERS_API_URL:-http://localhost:3002}
    ports:
      - "4173:80"
    restart: unless-stopped