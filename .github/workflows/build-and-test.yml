name: Build & Test All Services

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres-auth:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: market_user
          POSTGRES_PASSWORD: market_password
          POSTGRES_DB: auth_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      postgres-catalog:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: market_user
          POSTGRES_PASSWORD: market_password
          POSTGRES_DB: catalog_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      postgres-orders:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: market_user
          POSTGRES_PASSWORD: market_password
          POSTGRES_DB: orders_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Auth Service
      - name: Install Auth Service dependencies
        working-directory: ./auth
        run: npm ci

      - name: Lint Auth Service
        working-directory: ./auth
        run: npm run lint --if-present

      - name: Build Auth Service
        working-directory: ./auth
        run: npm run build

      # Catalog Service
      - name: Install Catalog Service dependencies
        working-directory: ./catalog
        run: npm ci

      - name: Lint Catalog Service
        working-directory: ./catalog
        run: npm run lint --if-present

      - name: Build Catalog Service
        working-directory: ./catalog
        run: npm run build

      # Orders Service
      - name: Install Orders Service dependencies
        working-directory: ./orders
        run: npm ci

      - name: Lint Orders Service
        working-directory: ./orders
        run: npm run lint --if-present

      - name: Build Orders Service
        working-directory: ./orders
        run: npm run build

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [auth, catalog, orders]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
