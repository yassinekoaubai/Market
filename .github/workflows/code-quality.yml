name: Code Quality Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Check TypeScript compilation for each service
      - name: Check Auth Service TypeScript
        working-directory: ./auth
        run: |
          npm ci
          npm run build

      - name: Check Catalog Service TypeScript
        working-directory: ./catalog
        run: |
          npm ci
          npm run build

      - name: Check Orders Service TypeScript
        working-directory: ./orders
        run: |
          npm ci
          npm run build

      # ESLint checks (if configured)
      - name: Lint Auth Service
        working-directory: ./auth
        run: npm run lint --if-present || true

      - name: Lint Catalog Service
        working-directory: ./catalog
        run: npm run lint --if-present || true

      - name: Lint Orders Service
        working-directory: ./orders
        run: npm run lint --if-present || true

      # Dependency audit
      - name: Audit Auth Service dependencies
        working-directory: ./auth
        run: npm audit --audit-level=moderate || true

      - name: Audit Catalog Service dependencies
        working-directory: ./catalog
        run: npm audit --audit-level=moderate || true

      - name: Audit Orders Service dependencies
        working-directory: ./orders
        run: npm audit --audit-level=moderate || true
