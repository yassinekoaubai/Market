name: End-to-End Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"  # Daily at 2 AM UTC

env:
  NODE_VERSION: "20"

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      postgres-auth:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: market_user
          POSTGRES_PASSWORD: market_password
          POSTGRES_DB: auth_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      postgres-catalog:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: market_user
          POSTGRES_PASSWORD: market_password
          POSTGRES_DB: catalog_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      postgres-orders:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: market_user
          POSTGRES_PASSWORD: market_password
          POSTGRES_DB: orders_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # Setup Auth Service
      - name: Setup Auth Service
        working-directory: ./auth
        run: |
          npm ci
          cat > .env.test << EOF
          DATABASE_URL=postgresql://market_user:market_password@localhost:5432/auth_db
          PORT=3000
          NODE_ENV=test
          JWT_SECRET=test-secret-key
          JWT_EXPIRE=7d
          REFRESH_TOKEN_SECRET=test-refresh-secret
          REFRESH_TOKEN_EXPIRE=30d
          EOF
          npm run migrate:dev --if-present
          npm run seed --if-present

      # Setup Catalog Service
      - name: Setup Catalog Service
        working-directory: ./catalog
        run: |
          npm ci
          cat > .env.test << EOF
          DATABASE_URL=postgresql://market_user:market_password@localhost:5433/catalog_db
          PORT=3001
          NODE_ENV=test
          CORS_ORIGIN=http://localhost:3000,http://localhost:3001,http://localhost:3002
          AUTH_SERVICE_URL=http://localhost:3000
          EOF
          npm run migrate:dev --if-present
          npm run seed --if-present

      # Setup Orders Service
      - name: Setup Orders Service
        working-directory: ./orders
        run: |
          npm ci
          cat > .env.test << EOF
          DATABASE_URL=postgresql://market_user:market_password@localhost:5434/orders_db
          PORT=3002
          NODE_ENV=test
          CORS_ORIGIN=http://localhost:3000,http://localhost:3001,http://localhost:3002
          AUTH_SERVICE_URL=http://localhost:3000
          CATALOG_SERVICE_URL=http://localhost:3001
          EOF
          npm run migrate:dev --if-present
          npm run seed --if-present

      # Start services in background
      - name: Start Auth Service
        working-directory: ./auth
        run: npm run dev &
        env:
          NODE_ENV: test

      - name: Start Catalog Service
        working-directory: ./catalog
        run: npm run dev &
        env:
          NODE_ENV: test

      - name: Start Orders Service
        working-directory: ./orders
        run: npm run dev &
        env:
          NODE_ENV: test

      # Wait for services to start
      - name: Wait for services to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/health && \
               curl -f http://localhost:3001/health && \
               curl -f http://localhost:3002/health; then
              echo "All services are healthy"
              exit 0
            fi
            echo "Attempt $i: Waiting for services..."
            sleep 2
          done
          echo "Services did not start in time"
          exit 1

      # Run Auth Service tests
      - name: Test Auth Service
        working-directory: ./auth
        run: npm test --if-present

      # Run Catalog Service tests
      - name: Test Catalog Service
        working-directory: ./catalog
        run: npm test --if-present

      # Run Orders Service tests
      - name: Test Orders Service
        working-directory: ./orders
        run: npm test --if-present
