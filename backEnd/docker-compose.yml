version: "3.8"

services:
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-catalog:
    image: postgres:15-alpine
    container_name: postgres-catalog
    environment:
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_password
      POSTGRES_DB: catalog_db
    ports:
      - "5433:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-orders:
    image: postgres:15-alpine
    container_name: postgres-orders
    environment:
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_password
      POSTGRES_DB: orders_db
    ports:
      - "5434:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
      args:
        DATABASE_URL: "postgresql://market_user:market_password@host.docker.internal:5432/auth_db"
      extra_hosts:
        - "host.docker.internal:host-gateway"
    container_name: auth-service
    environment:
      DATABASE_URL: "postgresql://market_user:market_password@postgres-auth:5432/auth_db"
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: "http://localhost:5173,http://localhost:4173,http://localhost:3000,http://localhost:3001,http://localhost:3002"
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRE: 7d
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-change-this-refresh-secret}
      REFRESH_TOKEN_EXPIRE: 30d
    ports:
      - "3000:3000"
    depends_on:
      postgres-auth:
        condition: service_healthy
    restart: unless-stopped

  catalog-service:
    build:
      context: ./catalog
      dockerfile: Dockerfile
    container_name: catalog-service
    environment:
      DATABASE_URL: "postgresql://market_user:market_password@postgres-catalog:5432/catalog_db"
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: "http://localhost:5173,http://localhost:4173,http://localhost:3000,http://localhost:3001,http://localhost:3002"
      AUTH_SERVICE_URL: "http://auth-service:3000"
    ports:
      - "3001:3001"
    depends_on:
      postgres-catalog:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  orders-service:
    build:
      context: ./orders
      dockerfile: Dockerfile
    container_name: orders-service
    environment:
      DATABASE_URL: "postgresql://market_user:market_password@postgres-orders:5432/orders_db"
      PORT: 3002
      NODE_ENV: production
      CORS_ORIGIN: "http://localhost:5173,http://localhost:4173,http://localhost:3000,http://localhost:3001,http://localhost:3002"
      AUTH_SERVICE_URL: "http://auth-service:3000"
      CATALOG_SERVICE_URL: "http://catalog-service:3001"
    ports:
      - "3002:3002"
    depends_on:
      postgres-orders:
        condition: service_healthy
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
    restart: unless-stopped

volumes:
  auth_db_data:
  catalog_db_data:
  orders_db_data:

networks:
  default:
    name: market-network
